<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COTB '26 | LIVE PORTAL</title>
    <style>
        :root { --primary: #002D62; --gold: #FFD700; }
        body { font-family: -apple-system, sans-serif; background: var(--primary); color: white; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { padding: 20px; width: 100%; max-width: 400px; }
        h1 { font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 1px; }
        .hub-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .btn { display: block; padding: 20px; margin: 15px 0; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: transform 0.2s, background 0.2s; border: none; cursor: pointer; }
        
        .btn-parade { background: var(--primary); color: white; border: 2px solid var(--primary); }
        .btn-match { background: var(--gold); color: var(--primary); }
        
        .btn:active { transform: scale(0.95); }
        
        .footer { margin-top: 30px; font-size: 12px; opacity: 0.7; }
        .live-pulse { height: 10px; width: 10px; background: #ff0000; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; margin-right: 5px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="hub-card">
            <p style="color: #666; font-weight: bold; margin-bottom: 5px;">OFFICIAL LIVE PORTAL</p>
            <h1 style="color: var(--primary); margin-top: 0;">CLASH OF THE BLUES</h1>
            
            <a href="parade.html" class="btn btn-parade">
                <span class="live-pulse"></span> TRACK THE PARADE
            </a>
            
            <a href="match.html" class="btn btn-match">
                <span class="live-pulse"></span> LIVE SCOREBOARD
            </a>
        </div>
        
        <div class="footer">
            📡 NSIS Media Unit | GitHub Edge<br>
            <b>Engineered by Aken Sanketh</b>
        </div>
    </div>
</body>
</html>
