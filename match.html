<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COTB '26 | LIVE SCORE</title>
    <style>
        :root { --navy: #002D62; --gold: #FFD700; --white: #ffffff; --gray: #f4f7f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--navy); color: var(--white); text-align: center; margin: 0; padding: 15px; }
        
        .card { background: var(--white); color: #333; padding: 0; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 400px; margin: 0 auto; overflow: hidden; }
        
        /* Match Header */
        .match-header { background: var(--gray); padding: 15px; border-bottom: 2px solid #eee; }
        .live-badge { background: #ff0000; color: white; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Score Display */
        .score-container { padding: 30px 20px; background: linear-gradient(180deg, #fff 0%, var(--gray) 100%); }
        .score-val { font-size: 3.5rem; font-weight: 900; color: var(--navy); line-height: 1; display: block; margin: 10px 0; letter-spacing: -2px; }
        .overs-val { font-size: 1.1rem; font-weight: 600; color: #666; background: #ddd; padding: 4px 12px; border-radius: 20px; display: inline-block; }

        /* Match Info */
        .info-box { padding: 20px; border-top: 1px solid #eee; }
        .status-text { font-size: 1.2rem; font-weight: 700; color: var(--navy); margin-bottom: 5px; }
        .label { font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        .nav-btn { display: block; background: var(--navy); color: white; text-decoration: none; padding: 15px; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .nav-btn:hover { background: #001a3a; }

        #last-sync { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="card">
        <div class="match-header">
            <span class="live-badge">LIVE SCORE</span>
            <h1 style="font-size: 1.1rem; margin: 5px 0; color: var(--navy);">CLASH OF THE BLUES '26</h1>
        </div>

        <div class="score-container">
            <span class="label">Current Innings</span>
            <div id="score" class="score-val">0/0</div>
            <div id="overs" class="overs-val">0.0 Overs</div>
        </div>

        <div class="info-box">
            <div class="label">Match Situation</div>
            <div id="status" class="status-text">Updating...</div>
            <div id="location" style="font-size: 0.8rem; color: #777; font-weight: 500;">Please Wait</div>
        </div>

        <a href="index.html" class="nav-btn">← BACK TO LIVE PORTAL</a>
    </div>

    <div id="last-sync">ESTABLISHING SCORE FEED...</div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxGxEgHckLmJ5IQL2mzOHOQ0qMLzK2O4VOYq4wb1ZIeyrCK1-liG1Uu3h0pySMd-QPavQ/exec';

        async function fetchScore() {
            try {
                const response = await fetch(`${SCRIPT_URL}?t=${new Date().getTime()}`);
                const data = await response.json();

                // data.score corresponds to column C, data.overs to column D
                document.getElementById('score').innerText = data.score || "0/0";
                document.getElementById('overs').innerText = data.overs || "0.0 Overs";
                document.getElementById('status').innerText = data.status || "In Play";
                document.getElementById('location').innerText = data.location || "SSC Grounds";
                
                document.getElementById('last-sync').innerText = "LIVE SYNC: " + new Date().toLocaleTimeString();
            } catch (err) {
                document.getElementById('last-sync').innerText = "RECONNECTING TO SCORE ENGINE...";
            }
        }

        // Refresh every 4 seconds
        setInterval(fetchScore, 4000);
        fetchScore();
    </script>
</body>
</html>
