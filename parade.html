<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COTB '26 | PARADE TRACKER</title>
    <style>
        :root { --primary: #002D62; --accent: #ff0000; --soft-blue: #eef4fb; }
        body { font-family: -apple-system, sans-serif; background: var(--primary); color: white; text-align: center; margin: 0; padding: 15px; }
        
        .card { background: white; color: #333; padding: 25px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); max-width: 400px; margin: 0 auto; position: relative; }
        
        /* Progress Indicator */
        .route-line { width: 4px; background: var(--soft-blue); height: 50px; margin: 0 auto; position: relative; border-radius: 2px; }
        .route-dot { width: 15px; height: 15px; background: var(--accent); border-radius: 50%; position: absolute; left: -5.5px; top: 0; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }

        h1 { font-size: 1.3rem; color: var(--primary); margin: 10px 0; letter-spacing: 1px; }
        .status-box { background: var(--soft-blue); padding: 15px; border-radius: 15px; margin: 20px 0; }
        .loc-text { font-size: 1.8rem; font-weight: 800; color: var(--primary); display: block; margin-top: 5px; }
        
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        
        .nav-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; color: var(--primary); text-decoration: none; font-size: 12px; font-weight: bold; border: 2px solid var(--soft-blue); border-radius: 10px; transition: 0.3s; }
        .nav-btn:hover { background: var(--soft-blue); }

        #last-sync { font-size: 10px; color: #ccc; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="card">
        <div class="label">Parade Progress</div>
        <div class="route-line"><div class="route-dot"></div></div>
        
        <h1>PARADE TRACKER</h1>
        
        <div class="status-box">
            <span class="label">Current Landmark</span>
            <span id="location" class="loc-text">Locating...</span>
        </div>

        <div class="label">Live Status</div>
        <div id="status" style="font-weight: 700; color: var(--accent); font-size: 1.1rem; margin: 5px 0 15px 0;">Updating...</div>

        <a href="index.html" class="nav-btn">← BACK TO HUB</a>
        <div id="last-sync">Establishing Satellite Link...</div>
    </div>

    <p style="font-size: 11px; margin-top: 20px; opacity: 0.8;">📡 Data: NSIS Media | Engineered by <b>Aken Sanketh</b></p>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxGxEgHckLmJ5IQL2mzOHOQ0qMLzK2O4VOYq4wb1ZIeyrCK1-liG1Uu3h0pySMd-QPavQ/exec';

        async function updateData() {
            try {
                const response = await fetch(`${SCRIPT_URL}?t=${new Date().getTime()}`);
                const data = await response.json();

                if (data.location) {
                    document.getElementById('location').innerText = data.location;
                    document.getElementById('status').innerText = data.status || "In Progress";
                    document.getElementById('last-sync').innerText = "LIVE SYNC: " + new Date().toLocaleTimeString();
                }
            } catch (err) {
                document.getElementById('last-sync').innerText = "RECONNECTING...";
            }
        }

        setInterval(updateData, 4000);
        updateData();
    </script>
</body>
</html>
